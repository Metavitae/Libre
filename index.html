<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#D4621A">
<title>Libre — Your Number. Forever.</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Inter:wght@300;400;500;600&family=Caveat:wght@600&display=swap');

  :root {
    --atardecer: #D4621A;
    --mango: #F5A623;
    --tierra: #7A3B1E;
    --verde: #2E7D52;
    --crema-calida: #FBF3E8;
    --blanco-humo: #FDFAF5;
    --noche: #1A1208;
    --coral: #E8845A;
    --musgo: #4A7C59;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--crema-calida);
    color: var(--noche);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  .wave-divider { width: 100%; line-height: 0; overflow: hidden; }
  .wave-divider svg { display: block; width: 100%; }

  header {
    background: var(--atardecer);
    padding: 18px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner { display: flex; justify-content: space-between; align-items: center; }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 28px;
    color: var(--blanco-humo);
    letter-spacing: -0.5px;
  }

  .header-btn {
    background: var(--mango);
    color: var(--noche);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 9px 18px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
  }

  .hero {
    background: linear-gradient(160deg, var(--atardecer) 0%, var(--tierra) 100%);
    padding: 40px 20px 0;
    overflow: hidden;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: var(--mango);
    opacity: 0.15;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 60px; left: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--coral);
    opacity: 0.2;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .hero-tag::before { content: '🌱'; font-size: 12px; }

  .hero-h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 46px;
    line-height: 1.0;
    color: var(--blanco-humo);
    letter-spacing: -1px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .hero-h1 em { font-style: italic; color: var(--mango); }

  .hero-body {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(253,250,245,0.78);
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
    max-width: 320px;
  }

  .hero-cta-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .btn-primary {
    background: var(--mango);
    color: var(--noche);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 16px;
    padding: 16px 24px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    box-shadow: 0 4px 20px rgba(245,166,35,0.3);
  }

  .btn-outline {
    background: transparent;
    color: rgba(255,255,255,0.8);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    padding: 14px 24px;
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
  }

  .hero-photo-zone {
    width: calc(100% + 40px);
    margin-left: -20px;
    height: 300px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .hero-photo-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    filter: saturate(0.9) brightness(0.95);
  }

  .valores {
    background: var(--blanco-humo);
    padding: 44px 20px;
  }

  .section-tag {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--atardecer);
    margin-bottom: 12px;
    display: block;
  }

  .valores-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1.1;
    color: var(--noche);
    letter-spacing: -0.8px;
    margin-bottom: 28px;
  }

  .valor-item {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(26,18,8,0.08);
  }

  .valor-item:last-child { border-bottom: none; padding-bottom: 0; }

  .valor-circle {
    width: 48px; height: 48px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .valor-circle.naranja { background: rgba(212,98,26,0.12); }
  .valor-circle.verde { background: rgba(46,125,82,0.12); }
  .valor-circle.cielo { background: rgba(30,107,140,0.12); }
  .valor-circle.mango { background: rgba(245,166,35,0.15); }

  .valor-text h3 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--noche);
    margin-bottom: 4px;
  }

  .valor-text p {
    font-size: 13px;
    color: rgba(26,18,8,0.6);
    line-height: 1.6;
  }

  .photo-mosaic {
    display: grid;
    grid-template-columns: 3fr 2fr;
    grid-template-rows: 180px 140px;
    gap: 3px;
  }

  .mosaic-cell { overflow: hidden; position: relative; }
  .mosaic-cell.tall { grid-row: span 2; }

  .mosaic-cell img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.85) brightness(0.98);
  }

  .planes {
    padding: 40px 20px;
    background: var(--verde);
    position: relative;
    overflow: hidden;
  }

  .planes::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(245,166,35,0.1);
  }

  .planes-tag {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--mango);
    display: block;
    margin-bottom: 8px;
  }

  .planes-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 30px;
    color: var(--blanco-humo);
    letter-spacing: -0.8px;
    margin-bottom: 24px;
    line-height: 1.1;
  }

  .plan-pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
  }

  .plan-pill.featured {
    background: rgba(245,166,35,0.2);
    border-color: var(--mango);
  }

  .plan-pill-price {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--mango);
    letter-spacing: -1px;
    min-width: 90px;
    line-height: 1;
  }

  .plan-pill-price small {
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    color: rgba(245,166,35,0.65);
    letter-spacing: 0;
    display: block;
    margin-top: 2px;
  }

  .plan-pill-info h3 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--blanco-humo);
    margin-bottom: 3px;
  }

  .plan-pill-info p {
    font-size: 11px;
    color: rgba(253,250,245,0.55);
    line-height: 1.4;
  }

  /* LOCAL STATS BLOCK */
  .local-stats {
    background: var(--crema-calida);
    padding: 32px 20px;
    border-top: 1px solid rgba(26,18,8,0.08);
    border-bottom: 1px solid rgba(26,18,8,0.08);
  }

  .stats-tag {
    font-family: 'Caveat', cursive;
    font-size: 15px;
    color: var(--musgo);
    display: block;
    margin-bottom: 8px;
  }

  .stats-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--noche);
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 16px 14px;
    border: 1px solid rgba(26,18,8,0.06);
  }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--atardecer);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: rgba(26,18,8,0.5);
    line-height: 1.4;
  }

  .operators-block {
    margin-top: 16px;
    background: white;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid rgba(26,18,8,0.06);
  }

  .operators-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: rgba(26,18,8,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: block;
  }

  .operators-list {
    font-size: 12px;
    color: var(--atardecer);
    font-weight: 500;
    line-height: 1.8;
  }

  .testimonios {
    padding: 40px 20px;
    background: var(--blanco-humo);
  }

  .test-tag {
    font-family: 'Caveat', cursive;
    font-size: 15px;
    color: var(--atardecer);
    display: block;
    margin-bottom: 8px;
  }

  .test-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--noche);
    letter-spacing: -0.5px;
    margin-bottom: 24px;
    line-height: 1.1;
  }

  .testimonio-card {
    background: var(--crema-calida);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    border: 1px solid rgba(212,98,26,0.1);
  }

  .test-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 3px solid var(--mango);
  }

  .test-avatar img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .test-content blockquote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--noche);
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .test-who {
    font-size: 10px;
    color: var(--atardecer);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .cta-final {
    background: linear-gradient(150deg, var(--mango) 0%, var(--atardecer) 100%);
    padding: 48px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-handwriting {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
    display: block;
  }

  .cta-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 36px;
    color: var(--blanco-humo);
    letter-spacing: -1px;
    line-height: 1.0;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .cta-body {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 28px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  .btn-cta-white {
    background: white;
    color: var(--atardecer);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 16px 32px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    margin-bottom: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    position: relative;
    z-index: 1;
  }

  .btn-cta-ghost {
    background: transparent;
    color: rgba(255,255,255,0.8);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    padding: 13px 24px;
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.75);
    z-index: 1000;
    align-items: flex-end;
  }

  .modal-overlay.active { display: flex; }

  .modal-card {
    background: var(--blanco-humo);
    width: 100%;
    max-height: 90svh;
    overflow-y: auto;
    border-radius: 24px 24px 0 0;
    padding: 28px 20px 44px;
    position: relative;
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: rgba(26,18,8,0.15);
    border-radius: 100px;
    margin: 0 auto 20px;
  }

  .modal-close-btn {
    position: absolute;
    top: 20px; right: 20px;
    background: rgba(26,18,8,0.08);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 14px;
    color: var(--noche);
    cursor: pointer;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--noche);
    letter-spacing: -0.8px;
    margin-bottom: 4px;
  }

  .modal-subtitle {
    font-size: 12px;
    color: var(--atardecer);
    font-weight: 500;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(26,18,8,0.1);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(26,18,8,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 6px;
  }

  .form-control {
    width: 100%;
    background: var(--crema-calida);
    border: 1.5px solid rgba(26,18,8,0.12);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--noche);
    outline: none;
    -webkit-appearance: none;
  }

  .form-control:focus { border-color: var(--atardecer); }

  .success-state {
    display: none;
    text-align: center;
    padding: 24px 0;
  }

  .success-emoji { font-size: 48px; display: block; margin-bottom: 12px; }

  .success-state h3 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--verde);
    margin-bottom: 8px;
  }

  .success-state p { font-size: 13px; color: rgba(26,18,8,0.5); line-height: 1.5; }

  footer {
    background: var(--noche);
    padding: 28px 20px;
  }

  .footer-brand {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 26px;
    color: var(--blanco-humo);
    margin-bottom: 6px;
  }

  .footer-soul {
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: var(--mango);
    margin-bottom: 16px;
    display: block;
  }

  .footer-legal {
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    line-height: 1.7;
  }

  .footer-legal a { color: rgba(245,166,35,0.45); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand-name">Libre</div>
    <button class="header-btn" id="header-cta" onclick="openModal()">—</button>
  </div>
</header>

<section class="hero">
  <div class="hero-tag" id="hero-tag">—</div>
  <h1 class="hero-h1" id="hero-h1">—</h1>
  <p class="hero-body" id="hero-body">—</p>
  <div class="hero-cta-wrap">
    <a href="#" class="btn-primary" id="hero-btn1" onclick="openModal(event)">—</a>
    <a href="tel:+16203830333" class="btn-outline" id="hero-btn2">—</a>
  </div>
  <div class="hero-photo-zone">
    <img src="https://source.unsplash.com/featured/800x600/?woman,phone,warm,sunset" alt="Libre">
  </div>
</section>

<div class="wave-divider" style="background:var(--atardecer)">
  <svg viewBox="0 0 375 32" preserveAspectRatio="none" height="32">
    <path d="M0,0 C80,32 295,0 375,24 L375,32 L0,32 Z" fill="#FBF3E8"/>
  </svg>
</div>

<section class="valores">
  <span class="section-tag" id="val-tag">—</span>
  <h2 class="valores-h2" id="val-h2">—</h2>

  <div class="valor-item">
    <div class="valor-circle naranja">📵</div>
    <div class="valor-text">
      <h3 id="v1-title">—</h3>
      <p id="v1-body">—</p>
    </div>
  </div>
  <div class="valor-item">
    <div class="valor-circle verde">🌐</div>
    <div class="valor-text">
      <h3 id="v2-title">—</h3>
      <p id="v2-body">—</p>
    </div>
  </div>
  <div class="valor-item">
    <div class="valor-circle cielo">👨‍👩‍👧‍👦</div>
    <div class="valor-text">
      <h3 id="v3-title">—</h3>
      <p id="v3-body">—</p>
    </div>
  </div>
  <div class="valor-item">
    <div class="valor-circle mango">🔄</div>
    <div class="valor-text">
      <h3 id="v4-title">—</h3>
      <p id="v4-body">—</p>
    </div>
  </div>
</section>

<div class="photo-mosaic">
  <div class="mosaic-cell tall">
    <img src="https://source.unsplash.com/featured/450x640/?woman,portrait,latin" alt="">
  </div>
  <div class="mosaic-cell">
    <img src="https://source.unsplash.com/featured/300x290/?family,latin,together" alt="">
  </div>
  <div class="mosaic-cell">
    <img src="https://source.unsplash.com/featured/300x220/?outdoor,sunlight,warm" alt="">
  </div>
</div>

<section class="planes">
  <span class="planes-tag" id="plans-tag">—</span>
  <h2 class="planes-h2" id="plans-h2">—</h2>
  <div id="plans-container"></div>
</section>

<div class="wave-divider" style="background:var(--blanco-humo)">
  <svg viewBox="0 0 375 32" preserveAspectRatio="none" height="32">
    <path d="M0,32 C80,0 295,32 375,8 L375,0 L0,0 Z" fill="#2E7D52"/>
  </svg>
</div>

<!-- LOCAL STATS -->
<section class="local-stats">
  <span class="stats-tag" id="stats-tag">—</span>
  <h2 class="stats-h2" id="stats-h2">—</h2>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="operators-block">
    <span class="operators-label" id="ops-label">—</span>
    <div class="operators-list" id="ops-list">—</div>
  </div>
</section>

<section class="testimonios">
  <span class="test-tag" id="test-tag">—</span>
  <h2 class="test-h2" id="test-h2">—</h2>

  <div class="testimonio-card">
    <div class="test-avatar">
      <img src="https://source.unsplash.com/featured/112x112/?woman,latin,smile" alt="">
    </div>
    <div class="test-content">
      <blockquote id="test1-quote">—</blockquote>
      <div class="test-who" id="test1-who">—</div>
    </div>
  </div>

  <div class="testimonio-card">
    <div class="test-avatar">
      <img src="https://source.unsplash.com/featured/112x112/?man,latin,friendly" alt="">
    </div>
    <div class="test-content">
      <blockquote id="test2-quote">—</blockquote>
      <div class="test-who" id="test2-who">—</div>
    </div>
  </div>

// ─── DETECT COUNTRY ──────────────────────────────────────────────────────────
async function detectCountry() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    return d.country_code || 'DEFAULT';
  } catch(e) {
    const lang = navigator.language || 'en';
    if (lang.startsWith('pt')) return 'BR';
    if (lang.startsWith('es')) return 'MX';
    return 'DEFAULT';
  }
}

// ─── FORMAT PRICE ─────────────────────────────────────────────────────────────
function fmtPrice(symbol, amount, currency) {
  if (['MXN','COP','ARS','CLP'].includes(currency)) {
    return symbol + amount.toLocaleString();
  }
  return symbol + amount.toFixed(2);
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(e) {
  if (e) e.preventDefault();
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}
function closeIfOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
function submitForm(e) {
  e.preventDefault();
  const form = document.getElementById('libreForm');
  const btn = document.getElementById('modal-btn');
  const orig = btn.textContent;
  btn.disabled = true;
  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(() => {
    form.style.display = 'none';
    document.getElementById('successState').style.display = 'block';
  }).catch(() => {
    btn.textContent = orig;
    btn.disabled = false;
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
detectCountry().then(renderPage);
