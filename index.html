<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#D4621A">
<title>Libre — Your Number. Forever.</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Inter:wght@300;400;500;600&family=Caveat:wght@600&display=swap');

  :root {
    --atardecer: #D4621A;
    --mango: #F5A623;
    --tierra: #7A3B1E;
    --verde: #2E7D52;
    --crema-calida: #FBF3E8;
    --blanco-humo: #FDFAF5;
    --noche: #1A1208;
    --coral: #E8845A;
    --musgo: #4A7C59;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--crema-calida);
    color: var(--noche);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  .wave-divider { width: 100%; line-height: 0; overflow: hidden; }
  .wave-divider svg { display: block; width: 100%; }

  header {
    background: var(--atardecer);
    padding: 18px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner { display: flex; justify-content: space-between; align-items: center; }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 28px;
    color: var(--blanco-humo);
    letter-spacing: -0.5px;
  }

  .header-btn {
    background: linear-gradient(135deg, var(--mango), var(--atardecer));
    color: white;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(212,98,26,0.3);
  }

  .hero {
    background: linear-gradient(160deg, var(--atardecer) 0%, var(--tierra) 100%);
    padding: 40px 20px 0;
    overflow: hidden;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: var(--mango);
    opacity: 0.15;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 60px; left: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--coral);
    opacity: 0.2;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .hero-tag::before { content: '🌱'; font-size: 12px; }

  .hero-h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 46px;
    line-height: 1.0;
    color: var(--blanco-humo);
    letter-spacing: -1px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .hero-h1 em { font-style: italic; color: var(--mango); }

  .hero-body {
    font-size: 16px;
    line-height: 1.7;
    color: rgba(253,250,245,0.78);
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
    max-width: 320px;
  }

  .hero-cta-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  /* SOLARPUNK BUTTONS — organic pill, warm, living */
  .btn-primary {
    background: linear-gradient(135deg, var(--mango) 0%, var(--atardecer) 100%);
    color: white;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 18px 28px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    box-shadow: 0 6px 24px rgba(212,98,26,0.35);
    position: relative;
    letter-spacing: -0.2px;
  }

  .btn-primary::before {
    content: '🌱 ';
    font-size: 14px;
  }

  .btn-outline {
    background: transparent;
    color: rgba(255,255,255,0.85);
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: 18px;
    padding: 12px 24px;
    border: 2px dashed rgba(255,255,255,0.4);
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .hero-photo-zone {
    width: calc(100% + 40px);
    margin-left: -20px;
    height: 300px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .hero-photo-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    filter: saturate(0.9) brightness(0.95);
  }

  .valores {
    background: var(--blanco-humo);
    padding: 44px 20px;
  }

  .section-tag {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--atardecer);
    margin-bottom: 12px;
    display: block;
  }

  .valores-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1.1;
    color: var(--noche);
    letter-spacing: -0.8px;
    margin-bottom: 28px;
  }

  .valor-item {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(26,18,8,0.08);
  }

  .valor-item:last-child { border-bottom: none; padding-bottom: 0; }

  .valor-circle {
    width: 48px; height: 48px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .valor-circle.naranja { background: rgba(212,98,26,0.12); }
  .valor-circle.verde { background: rgba(46,125,82,0.12); }
  .valor-circle.cielo { background: rgba(30,107,140,0.12); }
  .valor-circle.mango { background: rgba(245,166,35,0.15); }

  .valor-text h3 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--noche);
    margin-bottom: 4px;
  }

  .valor-text p {
    font-size: 15px;
    color: rgba(26,18,8,0.6);
    line-height: 1.6;
  }

  .photo-mosaic {
    display: grid;
    grid-template-columns: 3fr 2fr;
    grid-template-rows: 180px 140px;
    gap: 3px;
  }

  .mosaic-cell { overflow: hidden; position: relative; }
  .mosaic-cell.tall { grid-row: span 2; }

  .mosaic-cell img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.85) brightness(0.98);
  }

  .planes {
    padding: 40px 20px;
    background: var(--verde);
    position: relative;
    overflow: hidden;
  }

  .planes::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(245,166,35,0.1);
  }

  .planes-tag {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--mango);
    display: block;
    margin-bottom: 8px;
  }

  .planes-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 30px;
    color: var(--blanco-humo);
    letter-spacing: -0.8px;
    margin-bottom: 24px;
    line-height: 1.1;
  }

  .plan-pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
  }

  .plan-pill.featured {
    background: rgba(245,166,35,0.2);
    border-color: var(--mango);
  }

  .plan-pill-price {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--mango);
    letter-spacing: -1px;
    min-width: 90px;
    line-height: 1;
  }

  .plan-pill-price small {
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    color: rgba(245,166,35,0.65);
    letter-spacing: 0;
    display: block;
    margin-top: 2px;
  }

  .plan-pill-info h3 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--blanco-humo);
    margin-bottom: 3px;
  }

  .plan-pill-info p {
    font-size: 13px;
    color: rgba(253,250,245,0.55);
    line-height: 1.4;
  }

  /* THE CLOCK */
  .clock-section {
    background: var(--crema-calida);
    padding: 36px 20px;
    border-top: 1px solid rgba(26,18,8,0.08);
    border-bottom: 1px solid rgba(26,18,8,0.08);
  }

  .clock-tag {
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--musgo);
    display: block;
    margin-bottom: 8px;
  }

  .clock-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--noche);
    margin-bottom: 20px;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .clock-card {
    background: white;
    border-radius: 20px;
    padding: 24px 20px;
    border: 1px solid rgba(212,98,26,0.15);
    text-align: center;
    margin-bottom: 16px;
  }

  .clock-since-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: rgba(26,18,8,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: block;
  }

  .clock-year-input {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .clock-btn {
    width: 36px; height: 36px;
    background: var(--atardecer);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    flex-shrink: 0;
  }

  .clock-year-display {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 32px;
    color: var(--noche);
    letter-spacing: -1px;
    min-width: 60px;
    text-align: center;
  }

  .clock-total-paid {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 52px;
    color: var(--atardecer);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .clock-total-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: rgba(26,18,8,0.5);
    margin-bottom: 20px;
  }

  .clock-vs {
    background: linear-gradient(135deg, var(--mango), var(--atardecer));
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .clock-vs-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: white;
  }

  .clock-vs-price {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    color: white;
    letter-spacing: -0.5px;
  }

  .clock-vs-sub {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    display: block;
    text-align: right;
  }

  .clock-note {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(26,18,8,0.5);
    text-align: center;
    margin-top: 14px;
    line-height: 1.5;
  }

  .testimonios {
    padding: 40px 20px;
    background: var(--blanco-humo);
  }

  .test-tag {
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--atardecer);
    display: block;
    margin-bottom: 8px;
  }

  .test-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--noche);
    letter-spacing: -0.5px;
    margin-bottom: 24px;
    line-height: 1.1;
  }

  .testimonio-card {
    background: var(--crema-calida);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    border: 1px solid rgba(212,98,26,0.1);
  }

  .test-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 3px solid var(--mango);
  }

  .test-avatar img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .test-content blockquote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--noche);
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .test-who {
    font-size: 12px;
    color: var(--atardecer);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .cta-final {
    background: linear-gradient(150deg, var(--mango) 0%, var(--atardecer) 100%);
    padding: 48px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-handwriting {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
    display: block;
  }

  .cta-h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 36px;
    color: var(--blanco-humo);
    letter-spacing: -1px;
    line-height: 1.0;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .cta-body {
    font-size: 16px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 28px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  .btn-cta-white {
    background: white;
    color: var(--atardecer);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 18px 32px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    margin-bottom: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    position: relative;
    z-index: 1;
    letter-spacing: -0.2px;
  }

  .btn-cta-white::before { content: '🌱 '; font-size: 14px; }

  .btn-cta-ghost {
    background: transparent;
    color: rgba(255,255,255,0.85);
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: 18px;
    padding: 11px 24px;
    border: 2px dashed rgba(255,255,255,0.4);
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.75);
    z-index: 1000;
    align-items: flex-end;
  }

  .modal-overlay.active { display: flex; }

  .modal-card {
    background: var(--blanco-humo);
    width: 100%;
    max-height: 90svh;
    overflow-y: auto;
    border-radius: 24px 24px 0 0;
    padding: 28px 20px 44px;
    position: relative;
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: rgba(26,18,8,0.15);
    border-radius: 100px;
    margin: 0 auto 20px;
  }

  .modal-close-btn {
    position: absolute;
    top: 20px; right: 20px;
    background: rgba(26,18,8,0.08);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 14px;
    color: var(--noche);
    cursor: pointer;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--noche);
    letter-spacing: -0.8px;
    margin-bottom: 4px;
  }

  .modal-subtitle {
    font-size: 14px;
    color: var(--atardecer);
    font-weight: 500;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(26,18,8,0.1);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(26,18,8,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 6px;
  }

  .form-control {
    width: 100%;
    background: var(--crema-calida);
    border: 1.5px solid rgba(26,18,8,0.12);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--noche);
    outline: none;
    -webkit-appearance: none;
  }

  .form-control:focus { border-color: var(--atardecer); }

  .success-state {
    display: none;
    text-align: center;
    padding: 24px 0;
  }

  .success-emoji { font-size: 48px; display: block; margin-bottom: 12px; }

  .success-state h3 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--verde);
    margin-bottom: 8px;
  }

  .success-state p { font-size: 15px; color: rgba(26,18,8,0.5); line-height: 1.5; }

  footer {
    background: var(--noche);
    padding: 28px 20px;
  }

  .footer-brand {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 26px;
    color: var(--blanco-humo);
    margin-bottom: 6px;
  }

  .footer-soul {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--mango);
    margin-bottom: 16px;
    display: block;
  }

  .footer-legal {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    line-height: 1.7;
  }

  .footer-legal a { color: rgba(245,166,35,0.45); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand-name">Libre</div>
    <button class="header-btn" id="header-cta" onclick="openModal()">—</button>
  </div>
</header>

<section class="hero">
  <div class="hero-tag" id="hero-tag" style="flex-direction:column;align-items:flex-start;gap:2px;padding:8px 14px">—</div>
  <h1 class="hero-h1" id="hero-h1">—</h1>
  <p class="hero-body" id="hero-body">—</p>
  <div class="hero-cta-wrap">
    <a href="#" class="btn-primary" id="hero-btn1" onclick="openModal(event)">—</a>
    <a href="tel:+16203830333" class="btn-outline" id="hero-btn2">—</a>
  </div>
  <div class="hero-photo-zone">
    <img src="https://picsum.photos/id/26/800/600" alt="Libre">
  </div>
</section>

<div class="wave-divider" style="background:var(--atardecer)">
  <svg viewBox="0 0 375 32" preserveAspectRatio="none" height="32">
    <path d="M0,0 C80,32 295,0 375,24 L375,32 L0,32 Z" fill="#FBF3E8"/>
  </svg>
</div>

<section class="valores">
  <span class="section-tag" id="val-tag">—</span>
  <h2 class="valores-h2" id="val-h2">—</h2>

  <div class="valor-item">
    <div class="valor-circle naranja">📵</div>
    <div class="valor-text">
      <h3 id="v1-title">—</h3>
      <p id="v1-body">—</p>
    </div>
  </div>
  <div class="valor-item">
    <div class="valor-circle verde">🌐</div>
    <div class="valor-text">
      <h3 id="v2-title">—</h3>
      <p id="v2-body">—</p>
    </div>
  </div>
  <div class="valor-item">
    <div class="valor-circle cielo">👨‍👩‍👧‍👦</div>
    <div class="valor-text">
      <h3 id="v3-title">—</h3>
      <p id="v3-body">—</p>
    </div>
  </div>
  <div class="valor-item">
    <div class="valor-circle mango">🔄</div>
    <div class="valor-text">
      <h3 id="v4-title">—</h3>
      <p id="v4-body">—</p>
    </div>
  </div>
</section>

<div class="photo-mosaic">
  <div class="mosaic-cell tall">
    <img src="https://picsum.photos/id/1027/450/640" alt="">
  </div>
  <div class="mosaic-cell">

// ─── DETECT COUNTRY ──────────────────────────────────────────────────────────
function detectCountry() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    const lang = (navigator.language || navigator.languages[0] || 'es').toLowerCase();
    
    const tzMap = {
      'America/Mexico_City':'MX','America/Monterrey':'MX','America/Merida':'MX',
      'America/Tijuana':'MX','America/Cancun':'MX','America/Chihuahua':'MX',
      'America/Bogota':'CO','America/Lima':'PE','America/Santiago':'CL',
      'America/Argentina/Buenos_Aires':'AR','America/Caracas':'VE',
      'America/Sao_Paulo':'BR','America/Manaus':'BR','America/Belem':'BR',
      'America/Fortaleza':'BR','America/Recife':'BR','America/Bahia':'BR',
      'Europe/Lisbon':'PT','Atlantic/Azores':'PT',
      'Europe/Madrid':'ES','Africa/Ceuta':'ES',
      'America/New_York':'US','America/Chicago':'US','America/Denver':'US',
      'America/Los_Angeles':'US','America/Phoenix':'US'
    };
    
    if (tzMap[tz]) return Promise.resolve(tzMap[tz]);
    
    if (lang.startsWith('pt-br') || lang === 'pt') return Promise.resolve('BR');
    if (lang.startsWith('pt')) return Promise.resolve('PT');
    if (lang.startsWith('es-mx')) return Promise.resolve('MX');
    if (lang.startsWith('es-co')) return Promise.resolve('CO');
    if (lang.startsWith('es-ar')) return Promise.resolve('AR');
    if (lang.startsWith('es-cl')) return Promise.resolve('CL');
    if (lang.startsWith('es-pe')) return Promise.resolve('PE');
    if (lang.startsWith('es')) return Promise.resolve('MX');
    
    return Promise.resolve('DEFAULT');
  } catch(e) {
    return Promise.resolve('DEFAULT');
  }
}

// ─── FORMAT PRICE ─────────────────────────────────────────────────────────────
function fmtPrice(symbol, amount, currency) {
  if (['MXN','COP','ARS','CLP'].includes(currency)) {
    return symbol + amount.toLocaleString();
  }
  return symbol + amount.toFixed(2);
}

  s('modal-subtitle', t.modal_subtitle);
  s('lbl-name', t.lbl_name);
  s('lbl-contact', t.lbl_contact);
  s('lbl-plan', t.lbl_plan);
  s('modal-btn', t.modal_btn);
  s('success-title', t.success_title);
  s('success-body', t.success_body);

  // Plan select
  s('plan-select', planKeys.map(k =>
    `<option value="${k}">${t.plan_names[k]} — ${fmtPrice(loc.symbol, loc.prices[k], loc.currency)} ${loc.currency}</option>`
  ).join(''), true);
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(e) {
  if (e) e.preventDefault();
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}
function closeIfOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
function submitForm(e) {
  e.preventDefault();
  const form = document.getElementById('libreForm');
  const btn = document.getElementById('modal-btn');
  const orig = btn.textContent;
  btn.disabled = true;
  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(() => {
    form.style.display = 'none';
    document.getElementById('successState').style.display = 'block';
  }).catch(() => {
    btn.textContent = orig;
    btn.disabled = false;
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

// ─── CLOCK LOGIC ─────────────────────────────────────────────────────────────
let clockLoc = null;
let clockYear = 2018;

function adjustYear(delta) {
  const current = new Date().getFullYear();
  clockYear = Math.max(1995, Math.min(current - 1, clockYear + delta));
  s('clock-year', clockYear);
  updateClock();
}

function updateClock() {
  if (!clockLoc) return;
  const current = new Date().getFullYear();
  const years = current - clockYear;
  const sym = clockLoc.symbol;
  const cur = clockLoc.currency;

  const monthlyCarrier = {
    MXN: 249, COP: 30000, ARS: 3500, CLP: 7990,
    PEN: 39, BRL: 39, EUR: 14.99, GBP: 12.99,
    USD: 19.99, CAD: 34.99, AUD: 29.99
  };

  const monthly = monthlyCarrier[cur] || 19.99;
  const total = monthly * 12 * years;

  const fmt = (n) => {
    if (['MXN','COP','ARS','CLP'].includes(cur)) return sym + Math.round(n).toLocaleString();
    return sym + n.toFixed(0);
  };

  s('clock-total', fmt(total));
  s('clock-vs-price', fmt(clockLoc.prices.digital));
}

function setClockText(loc, t) {
  clockLoc = loc;

  const texts = {
    es: {
      tag: 'El tiempo que llevan cobrándote',
      h2: '¿Desde cuándo tienes plan con una operadora?',
      since_label: 'Empecé a pagar en',
      total_label: 'Lo que le has dado a tu operadora',
      vs_label: 'Libre — pago único',
      vs_sub: 'una vez · gratis para siempre después',
      note: 'Después de tu primer pago, tu número no le cuesta nada a nadie. Nunca más.'
    },
    pt: {
      tag: 'O tempo que estão te cobrando',
      h2: 'Desde quando você tem plano com uma operadora?',
      since_label: 'Comecei a pagar em',
      total_label: 'O que você deu à sua operadora',
      vs_label: 'Livre — pagamento único',
      vs_sub: 'uma vez · grátis para sempre depois',
      note: 'Depois do primeiro pagamento, seu número não custa nada. Nunca mais.'
    },
    en: {
      tag: 'How long they have been charging you',
      h2: 'When did you get your first carrier plan?',
      since_label: 'I started paying in',
      total_label: 'What you have given your carrier',
      vs_label: 'Libre — one payment',
      vs_sub: 'once · free forever after',
      note: 'After your first payment, your number costs nothing. Ever again.'
    }
  };

  const cx = texts[loc.lang] || texts.en;
  s('clock-tag', cx.tag);
  s('clock-h2', cx.h2);
  s('clock-since-label', cx.since_label);
  s('clock-total-label', cx.total_label);
  s('clock-vs-label', cx.vs_label);
  s('clock-vs-sub', cx.vs_sub);
  s('clock-note', cx.note);

  const sym = loc.symbol;
  const cur = loc.currency;
  const fmt = (n) => ['MXN','COP','ARS','CLP'].includes(cur) ? sym + Math.round(n).toLocaleString() : sym + n.toFixed(0);
  s('clock-vs-price', fmt(loc.prices.digital));

  updateClock();
}

detectCountry().then(country => {
  try {
    renderPage(country);
    const loc = LOCALE_DATA[country] || LOCALE_DATA.DEFAULT;
    const t = T[loc.lang] || T.en;
    setClockText(loc, t);
  } catch(e) {
    console.error('Render error:', e);
    try {
      renderPage('MX');
      const loc = LOCALE_DATA['MX'];
      const t = T['es'];
      setClockText(loc, t);
    } catch(e2) { console.error('Fallback error:', e2); }
  }
});
